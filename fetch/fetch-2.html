<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fetch-2</title>
  </head>
  <body>
    <div id="result">
      <!-- js출력 -->
    </div>
    <script>
      fetch("product.json")
        .then((response) => response.json())
        .then((data) => {
        //   console.log(data);
        let html = ""
        data.forEach((item)=>{
            console.log(item)
            html += `<div class="card">
        <h3>상품명 : ${item.name}</h3>
        <p>가격 : ${item.price.toLocaleString()}</p>
       </div>`
        })
        document.querySelector("#result").innerHTML = html

        })
        .catch((error)=>{
            console.log(error)
        })
    </script>
  </body>
</html>
