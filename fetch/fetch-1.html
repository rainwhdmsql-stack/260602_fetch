<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fetch</title>
  </head>
  <body>
    <div id="display">
      <!-- js출력 -->
    </div>
    <script>
      // 서버에 데이터 요청을 보낸다.
      // fetch는 바로 데이터를 주는게 아니라, promise(약속)를 돌려준다.
      fetch("data.json")
        .then((response) => {
          console.log(response);
          if (!response.ok) {
            throw new Error("요청 실패");
          }
          return response.json();
          // 결과를 다음 .then()에게 전달한다.
        })
        .then((data) => {
          //   console.log(data);
          const displayE1 = document.querySelector("#display");
          displayE1.innerHTML = `
          <p>이름: ${data.name}</p>
       <p>나이: ${data.age}</p>
       <p>도시: ${data.city}</p>`;
        })
        .catch((error) => {
          console.error(`error : ${error}`);
        });
    </script>
  </body>
</html>
