<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>getch-3</title>
    <script src="item.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        max-width: 1200px;
        margin: 50px auto;
        padding: 20px;
        display: flex;
        gap: 30px;
      }
      .left {
        flex: 1;
      }
      .right {
        width: 480px;
      }
      .item-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }
      .item {
        width: calc(50%-10px);
        border: 1px solid #ddd;
        padding: 10px;
        cursor: pointer;
        transition: 0.3s;
      }
      .item:hover {
        transform: translateY(-5px);
      }
      .item img {
        width: 100%;
        object-fit: cover;
        display: block;
      }
      .item h3 {
        margin-top: 10px;
      }

      /* detail */
      .detail {
        border: 1px solid #ddd;
        padding: 20px;
      }
      .detail img {
        width: 100%;
        display: block;
        margin-bottom: 15px;
      }
      .detail h2 {
        margin-bottom: 10px;
      }
      .detail p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1>ITEMS</h1>
        <div class="items-container" id="items">
          <!-- js출력 -->
        </div>
      </div>
      <!-- 오른쪽 -->
      <div class="right">
        <div id="detail">
          <div class="detail">
            <h2>상품을 선택하세요</h2>
            <p>왼쪽 상품을 클릭하면 상세 정보가 표시됩니다.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
