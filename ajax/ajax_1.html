<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 비동기 : 오래걸리는 일을 시키고, 기다리지 않고 다른 일을 먼저 하는것
      //   서버 통신 기능
      const xhr = new XMLHttpRequest();
      console.log(xhr);
      xhr.open("GET", "data.json", true);
      xhr.onload = function () {
        console.log(xhr);
        // 200 요청 성공
        // 400 클라이언트 오류 (내잘못)
        // 500 서버오류
        if (xhr.status === 200) {
          // JSON.parse() 문자열(JSON형식) => 자바스크립트 객체로 변환해준다.
          const data = JSON.parse(xhr.responseText);
          console.log(data);
          document.write(`이름 : ${data.name} ,나이 : ${data.age}`)
        }
      };
      xhr.send();
    </script>
  </body>
</html>
